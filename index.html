<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Profileo · профориентация</title>
  <style>
    /* ===== СБРОС И БАЗОВЫЕ НАСТРОЙКИ (адаптив с первых строк) ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: radial-gradient(145% 140% at 0% 0%, #1c2a36, #0e151f);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    /* ===== ОСНОВНОЙ КОНТЕЙНЕР (резиновый, адаптивный) ===== */
    .chat-app {
      width: 100%;
      max-width: 1200px;      /* для больших экранов */
      height: 95vh;
      max-height: 900px;
      background: #1b2632;
      border-radius: clamp(28px, 6vw, 48px);  /* адаптивный радиус */
      box-shadow: 0 25px 60px -15px #000000e0, inset 0 1px 2px rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #2b4359;
      backdrop-filter: blur(2px);
      transition: border-radius 0.2s;
    }

    /* ===== ШАПКА ===== */
    .app-header {
      padding: 16px 20px 10px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 15px;
      border-bottom: 2px dashed #2a4053;
    }

    .app-header h1 {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 600;
      background: linear-gradient(135deg, #c8e3ff, #9fcbff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 7px #00000060;
      line-height: 1.2;
    }

    .key-badge {
      background: #1f3649;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: clamp(0.7rem, 2.5vw, 0.9rem);
      font-weight: 500;
      color: #c4defa;
      border: 1px solid #3c5e7e;
      box-shadow: inset 0 1px 5px #00000070;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    /* ===== ОБЛАСТЬ СООБЩЕНИЙ ===== */
    .messages-view {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: #17222d;
      box-shadow: inset 0 12px 20px -12px #04080c;
      scroll-behavior: smooth;
    }

    /* строки сообщений */
    .msg-row {
      display: flex;
      width: 100%;
    }

    .msg-row.user {
      justify-content: flex-end;
    }

    .msg-row.assistant {
      justify-content: flex-start;
    }

    /* пузырьки — адаптивная ширина, отступы */
    .msg-bubble {
      max-width: 85%;          /* на телефоне шире */
      padding: 14px 18px;
      border-radius: 28px;
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
      box-shadow: 0 8px 16px -6px #000000c0;
      border: 1px solid rgba(255,255,255,0.02);
      transition: 0.1s;
    }

    .user .msg-bubble {
      background: #1a4f72;     /* глубокий синий */
      color: #f3faff;
      border-bottom-right-radius: 6px;
      border-left: 4px solid #71b6f5;
    }

    .assistant .msg-bubble {
      background: #253f52;     /* мягкий сине-серый */
      color: #ecf3fe;
      border-bottom-left-radius: 6px;
      border-right: 4px solid #67a6d9;
    }

    /* ===== ИНДИКАТОР ПЕЧАТИ (три точки) ===== */
    .typing-block {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #253f52;
      padding: 14px 22px;
      border-radius: 40px;
      border-bottom-left-radius: 6px;
      width: fit-content;
      border: 1px solid #3e627f;
      box-shadow: 0 5px 12px #00000060;
    }

    .typing-block .dot {
      width: 11px;
      height: 11px;
      background: #97c0e8;
      border-radius: 50%;
      display: inline-block;
      animation: bounceCareer 1.2s infinite ease-in-out both;
    }

    .typing-block .dot:nth-child(1) { animation-delay: -0.3s; background: #b7daff; }
    .typing-block .dot:nth-child(2) { animation-delay: -0.15s; background: #9ec6f2; }
    .typing-block .dot:nth-child(3) { background: #83b2e0; }

    @keyframes bounceCareer {
      0%, 80%, 100% { transform: translateY(0) scale(0.8); opacity: 0.5; }
      40% { transform: translateY(-10px) scale(1.1); opacity: 1; background: #cfe5ff; }
    }

    /* ===== ПАНЕЛЬ ВВОДА (полностью адаптивная) ===== */
    .input-panel {
      background: #16212c;
      padding: 14px 18px 20px 18px;
      border-top: 2px solid #2a4055;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .field-group {
      flex: 1;
      background: #1f3343;
      border-radius: 50px;
      border: 1px solid #3d5f7c;
      padding: 6px 8px 6px 20px;
      display: flex;
      align-items: flex-end;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .field-group:focus-within {
      box-shadow: 0 0 0 3px #2b6a9cb0, inset 0 2px 5px #00000070;
      border-color: #5f9ed0;
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      padding: 12px 8px 12px 0;
      font-family: inherit;
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      line-height: 1.5;
      color: #f0f7ff;
      resize: none;
      outline: none;
      max-height: 130px;
      min-height: 28px;
    }

    textarea::placeholder {
      color: #5985ab;
      font-style: italic;
      font-weight: 300;
      opacity: 0.9;
      font-size: clamp(0.9rem, 3vw, 1rem);
    }

    /* кнопка — меняет размер под устройства */
    .action-btn {
      background: #1b5a83;
      border: 1px solid #3f8dc0;
      border-radius: 60px;
      width: clamp(58px, 15vw, 72px);
      height: clamp(58px, 15vw, 72px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.18s;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 8px 18px #102233;
    }

    .action-btn svg {
      width: clamp(26px, 7vw, 34px);
      height: clamp(26px, 7vw, 34px);
      fill: currentColor;
      filter: drop-shadow(0 2px 4px #00000080);
    }

    .action-btn:hover {
      background: #2474a5;
      border-color: #70b5ec;
      transform: scale(1.03) translateY(-3px);
    }

    .action-btn:active {
      transform: scale(0.95) translateY(2px);
      box-shadow: 0 3px 8px #0e1e30;
    }

    .action-btn:disabled {
      opacity: 0.4;
      background: #2a4b66;
      border-color: #386185;
      transform: none;
      box-shadow: none;
      pointer-events: none;
    }

    /* футер */
    .footer-tip {
      font-size: clamp(0.65rem, 2.2vw, 0.75rem);
      color: #4a7397;
      text-align: right;
      padding: 6px 22px 5px 0;
      background: #16212c;
      letter-spacing: 0.2px;
    }

    /* кастомный скролл (webkit) */
    .messages-view::-webkit-scrollbar {
      width: 5px;
    }
    .messages-view::-webkit-scrollbar-track {
      background: #1c3142;
    }
    .messages-view::-webkit-scrollbar-thumb {
      background: #3a668b;
      border-radius: 8px;
    }

    /* совсем маленькие экраны (до 400px) */
    @media (max-width: 420px) {
      .app-header {
        padding: 12px 14px 6px 14px;
      }
      .msg-bubble {
        max-width: 92%;
        padding: 12px 16px;
      }
      .input-panel {
        padding: 12px 12px 16px 12px;
        gap: 8px;
      }
      .field-group {
        padding-left: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-app">
    <!-- шапка: название и сокращённый ключ (для красоты) -->
    <div class="app-header">
      <h1>🧭 Profileo</h1>
      <span class="key-badge" title="sk_ajKGydMtB6CldDbDulOd004cG6AkboqG">🔑 sk_ajKG...boqG</span>
    </div>

    <!-- окно переписки -->
    <div id="chatWindow" class="messages-view">
      <!-- стартовое сообщение от ассистента (профориентация) -->
      <div class="msg-row assistant">
        <div class="msg-bubble">
          👋 Привет! Я помогу тебе с выбором профессии. Расскажи о своих увлечениях, любимых предметах или спроси про любую специальность — вместе найдём твой путь ✨
        </div>
      </div>
    </div>

    <!-- нижняя панель: поле ввода + кнопка -->
    <div class="input-panel">
      <div class="field-group">
        <textarea id="msgInput" placeholder="например: люблю рисовать и..." rows="1"></textarea>
      </div>
      <button class="action-btn" id="sendBtn" aria-label="Отправить">
        <svg viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
        </svg>
      </button>
    </div>
    <div class="footer-tip">* профориентация · gemini-fast · история не хранится</div>
  </div>

  <script>
    (function() {
      // ========== НАСТРОЙКИ ==========
      const API_URL = 'https://gen.pollinations.ai/v1/chat/completions';
      const MODEL = 'gemini-fast';
      // ТВОЙ API КЛЮЧ (полностью рабочий)
      const API_KEY = 'sk_ajKGydMtB6CldDbDulOd004cG6AkboqG';

      // DOM-элементы
      const chatContainer = document.getElementById('chatWindow');
      const textarea = document.getElementById('msgInput');
      const sendButton = document.getElementById('sendBtn');

      // состояние загрузки
      let isLoading = false;

      // --- адаптивная высота поля ввода ---
      function resizeTextarea() {
        textarea.style.height = 'auto';
        const maxHeight = 130;
        const newHeight = Math.min(textarea.scrollHeight, maxHeight);
        textarea.style.height = newHeight + 'px';
      }

      // --- добавить сообщение (role: "user" или "assistant") ---
      function addMessage(role, text) {
        const row = document.createElement('div');
        row.className = `msg-row ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = text;   // безопасно
        row.appendChild(bubble);
        chatContainer.appendChild(row);
        // прокрутить вниз
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      // --- показать индикатор "печатает" ---
      function showTypingIndicator() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'msg-row assistant';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
          <div class="typing-block">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        `;
        chatContainer.appendChild(typingDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      function hideTypingIndicator() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
      }

      // --- блокировка/разблокировка ---
      function setBusy( busy ) {
        isLoading = busy;
        sendButton.disabled = busy;
        textarea.disabled = busy;
      }

      // --- запрос к Pollinations (Gemini) с ТВОИМ КЛЮЧОМ ---
      async function fetchAssistantAnswer(userMessage) {
        const body = {
          model: MODEL,
          messages: [
            { role: 'user', content: userMessage }
          ]
        };

        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${API_KEY}`,   // ключ в точности как просили
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
          });

          if (!response.ok) {
            let errorDetails = `код: ${response.status}`;
            try {
              const errJson = await response.json();
              errorDetails = errJson.error?.message || JSON.stringify(errJson);
            } catch (e) {
              errorDetails = await response.text() || errorDetails;
            }
            throw new Error(`Ошибка · ${errorDetails}`);
          }

          const data = await response.json();

          // стандартный openAI-формат
          if (data.choices && data.choices[0]) {
            const first = data.choices[0];
            if (first.message && first.message.content) {
              return first.message.content;
            } else if (first.text) {
              return first.text;
            }
          }
          // запасной вариант
          return `🔍 ответ: ${JSON.stringify(data).slice(0, 250)}`;
        } catch (err) {
          console.error('fetch error:', err);
          throw err;
        }
      }

      // --- обработка отправки ---
      async function handleSend() {
        const userText = textarea.value.trim();
        if (userText === '' || isLoading) return;

        // 1. сообщение пользователя
        addMessage('user', userText);

        // 2. очистить поле
        textarea.value = '';
        resizeTextarea();

        // 3. показать "печатает"
        showTypingIndicator();

        // 4. заблокировать
        setBusy(true);

        // 5. запрос к API
        try {
          const reply = await fetchAssistantAnswer(userText);
          hideTypingIndicator();
          addMessage('assistant', reply);
        } catch (error) {
          hideTypingIndicator();
          let errorMsg = '😥 Не удалось получить ответ. Попробуй ещё раз.';
          if (error.message) {
            errorMsg = `⚠️ ${error.message.slice(0, 200)}`;
          }
          addMessage('assistant', errorMsg);
        } finally {
          setBusy(false);
          textarea.focus();
        }
      }

      // --- обработчики событий ---
      textarea.addEventListener('input', resizeTextarea);

      textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();   // отправка по Enter
          handleSend();
        }
      });

      sendButton.addEventListener('click', handleSend);

      // начальная настройка
      window.addEventListener('load', () => {
        textarea.focus();
        resizeTextarea();
      });

      // на случай ресайза окна (телефон/планшет)
      window.addEventListener('resize', resizeTextarea);
    })();
  </script>

  <!-- 
    ДИЗАЙН И ЦЕЛЬ:
    – Полностью адаптивный интерфейс (clamp, % и медиазапросы). 
      На телефоне кнопка и поля комфортного размера, пузырьки шире.
    – Тёмная тема с градиентами, профессиональная, но уютная.
    – Сообщения: пользователь (синий, справа), ассистент (серо-синий, слева).
    – Индикатор печати — прыгающие точки.
    – Использован предоставленный API-ключ sk_ajKGydMtB6CldDbDulOd004cG6AkboqG.
    – Тематика: профориентация для школьников. Помогает узнать о профессиях.
    – Минимум лишнего: только чат, поле ввода, кнопка. 
    – Работает сразу в браузере без дополнительных действий.
  -->
</body>
</html>
